name: Publish confect-workflow

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Run tests
        run: vp test

      - name: Check packages
        run: vp check

      - name: Publish package
        working-directory: packages/confect-workflow
        run: vp pm publish --access public --no-git-checks
